<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#f0ebe2" opacity="0.12"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="30%" stop-color="#0f0f0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f0f0f" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#F4A826" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f0f0f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#fade)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="170" width="5" height="290" rx="2.5" fill="#F4A826"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(106, 175)">
    <path d="M28 4 L18 28h10L16 56 L38 24h-12L28 4z" fill="#F4A826"/>
  </g>

  <!-- Main title -->
  <text x="160" y="258" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#f0ebe2" letter-spacing="-2">Electricity Load</text>
  <text x="160" y="336" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#F4A826" letter-spacing="-2">Calculator</text>

  <!-- Tagline -->
  <text x="162" y="395" font-family="Arial, sans-serif" font-size="22" fill="#a1a1aa" letter-spacing="0.2">Calculate kW, kVA &amp; monthly bill for your home</text>

  <!-- Stat badges -->
  <rect x="162" y="425" width="184" height="44" rx="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="254" y="452" font-family="Arial, sans-serif" font-size="15" fill="#f0ebe2" text-anchor="middle" font-weight="600">⚡  26 Appliances</text>

  <rect x="358" y="425" width="168" height="44" rx="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="442" y="452" font-family="Arial, sans-serif" font-size="15" fill="#f0ebe2" text-anchor="middle" font-weight="600">📂  5 Categories</text>

  <rect x="538" y="425" width="152" height="44" rx="22" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="614" y="452" font-family="Arial, sans-serif" font-size="15" fill="#f0ebe2" text-anchor="middle" font-weight="600">🆓  Free to Use</text>

  <!-- Decorative right-side circles -->
  <circle cx="980" cy="315" r="220" fill="none" stroke="#F4A826" stroke-width="1" opacity="0.08"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="#F4A826" stroke-width="0.8" opacity="0.06"/>
  <circle cx="980" cy="315" r="100" fill="none" stroke="#F4A826" stroke-width="0.6" opacity="0.06"/>
  <line x1="980" y1="95" x2="980" y2="535" stroke="#F4A826" stroke-width="0.5" opacity="0.06"/>
  <line x1="760" y1="315" x2="1200" y2="315" stroke="#F4A826" stroke-width="0.5" opacity="0.06"/>

  <!-- Large ghost bolt (right) -->
  <g transform="translate(924, 215)" opacity="0.12">
    <path d="M56 10 L36 60h20L28 120 L80 50h-24L56 10z" fill="#F4A826"/>
  </g>

  <!-- Bottom domain label -->
  <text x="162" y="555" font-family="Courier New, monospace" font-size="17" fill="#3f3f46" letter-spacing="3">electricityloadcalculator.com</text>
</svg>
